services:
  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5033/api}
    container_name: life-rescue-admin
    restart: unless-stopped
    ports:
      # 0.0.0.0 — доступ по статическому IPv4 сервера (например http://203.0.113.10)
      - "${ADMIN_BIND_IP:-0.0.0.0}:${ADMIN_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
